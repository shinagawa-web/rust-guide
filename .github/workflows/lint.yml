name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup gomarklint
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSL "https://github.com/shinagawa-web/gomarklint/releases/download/v3.2.3/gomarklint_Linux_x86_64.tar.gz" \
            | tar -xz -C "$HOME/.local/bin" gomarklint
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          gomarklint --version

      - name: Lint Markdown
        run: gomarklint --config .gomarklint.json ja/src en/src README.md CONTRIBUTING.md
