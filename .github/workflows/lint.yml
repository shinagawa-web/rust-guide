name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shinagawa-web/gomarklint@v3
        with:
          args: ja/src en/src README.md CONTRIBUTING.md
          comment-on-pr: 'true'
