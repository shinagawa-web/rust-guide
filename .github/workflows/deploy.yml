name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup mdbook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: '0.4.40'

      # ja/book.toml が mermaid preprocessor を宣言しているため、バイナリが無いと
      # `mdbook build ja` が失敗する。再現性のためバージョンを固定する。
      # 0.16.2 は mdbook 0.4.x 系（CI の 0.4.40）と互換のある最終バージョン。
      # 0.17.0 以降は mdbook 0.5.x 向けで preprocessor プロトコルが非互換。
      - name: Setup mdbook-mermaid
        env:
          MDBOOK_MERMAID_VERSION: '0.16.2'
        run: |
          url="https://github.com/badboy/mdbook-mermaid/releases/download/v${MDBOOK_MERMAID_VERSION}/mdbook-mermaid-v${MDBOOK_MERMAID_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          mkdir -p "$HOME/.local/bin"
          curl -sSL "$url" | tar -xz -C "$HOME/.local/bin" mdbook-mermaid
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/mdbook-mermaid" --version

      - name: Build ja
        run: mdbook build ja

      - name: Build en
        run: mdbook build en

      - name: Assemble site
        run: |
          mkdir -p _site/ja _site/en
          cp -r ja/book/. _site/ja/
          cp -r en/book/. _site/en/
          cp landing/index.html _site/index.html

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
