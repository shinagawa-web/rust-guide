[book]
title = "自分に合った Rust 入門"
authors = ["shinagawa-web"]
language = "ja"
src = "src"

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/shinagawa-web/rust-guide"
edit-url-template = "https://github.com/shinagawa-web/rust-guide/edit/main/ja/src/{path}"
additional-css = ["theme/custom.css"]
additional-js = ["mermaid-init.js", "sidebar-fold.js"]

[output.html.fold]
enable = true
level = 1

[preprocessor]

[preprocessor.mermaid]
command = "mdbook-mermaid"

